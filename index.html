<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報告アプリ_Tacchibanana_v18_A4</title>
    <link rel="icon" href="https://img.icons8.com/color/96/handshake-heart.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/96/handshake-heart.png">

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f9; --card: #ffffff; --border: #cbd5e1; --success: #27ae60; --orange: #e67e22; --dark: #1e293b; --danger: #e74c3c; --info: #3498db; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; line-height: 1.3; }
        .app-container { max-width: 850px; margin: auto; position: relative; }
        
        .title-selector-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; border-bottom: 3px double var(--primary); padding-bottom: 10px; }
        /* アプリアイコンのスタイル設定 */
        .app-icon-img { width: 55px; height: 55px; object-fit: contain; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .title-select { font-size: 1.4rem; font-weight: bold; color: var(--primary); border: none; background: transparent; text-align: left; cursor: pointer; letter-spacing: 0.1em; flex-grow: 1; outline: none; appearance: none; -webkit-appearance: none; }
        
        .btn-settings { position: fixed; top: 10px; right: 10px; z-index: 100; background: var(--dark); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 10px; position: relative; }
        
        #photo-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; background: #fff; border: 1px solid #cbd5e1; border-top: none; min-height: 0; }
        .photo-item { position: relative; width: 70px; height: 70px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del-img { position: absolute; top: 0; right: 0; background: rgba(231, 76, 60, 0.9); color: white; border: none; font-size: 12px; padding: 2px 6px; cursor: pointer; }
        
        .card { background: var(--card); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); padding: 15px; border: 1px solid var(--border); }
        .section-title { background: #475569; color: white; padding: 5px 10px; font-weight: bold; margin-top: 10px; font-size: 0.85rem; border-radius: 4px 4px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .content-box { border: 1px solid #475569; border-radius: 0 0 4px 4px; overflow: hidden; background: #fff; margin-bottom: 5px; }
        .input-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        .field { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.75rem; color: var(--primary); margin-bottom: 2px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        textarea { border: none; min-height: 60px; resize: none; width: 100%; display: block; }
        
        .vital-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 8px; background: #f8fafc; border-bottom: 1px solid #eee; }
        
        #impact_desc_box { background: #fffde7; padding: 8px; border: 1px solid #fbc02d; border-radius: 6px; margin-top: 5px; font-size: 12px; }
        .impact-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-weight: bold; color: white; font-size: 11px; margin-bottom: 2px; }

        .btn-pick { background: #e2e8f0; border: none; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; color: #1e293b; font-weight: bold; }
        .analysis-grid { display: flex; gap: 8px; padding: 10px; background: #fff; border: 1px solid #cbd5e1; border-top: none; }
        .m-box { flex: 1; }
        .m-sel { height: 80px !important; font-size: 11px; padding: 2px; }
        .btn-close-sel { width: 100%; padding: 4px; background: #64748b; color: white; border: none; border-radius: 4px; font-size: 10px; cursor: pointer; margin-top: 2px; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1rem; }
        .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        footer { text-align: center; padding: 15px 0; color: #64748b; font-size: 12px; }

        @media print {
            @page { size: A4; margin: 10mm; }
            body { background: white; padding: 0; font-size: 11pt; }
            .app-container { max-width: 100%; width: 100%; }
            .input-only, .btn-settings, .modal, .btn-pick, .btn-close-sel, .record-gen-section, .btn-del-img, .analysis-grid, footer { display: none !important; }
            .card { box-shadow: none; border: none; padding: 0; }
            input, select, textarea { border: none; padding: 4px 0; font-size: 11pt; background: transparent !important; appearance: none; -webkit-appearance: none; overflow: hidden; }
            textarea { height: auto !important; min-height: 1.2em; }
            .content-box { border: 1px solid #475569; margin-bottom: 10px; page-break-inside: avoid; }
            .section-title { background: #f0f0f0 !important; color: #000 !important; border: 1px solid #475569; border-bottom: none; -webkit-print-color-adjust: exact; }
            .vital-grid { background: white; padding: 4px; border: 1px solid #475569; border-top: none; margin-bottom: 5px; }
            .input-grid { gap: 10px; margin-bottom: 10px; border: 1px solid #eee; padding: 5px; border-radius: 4px; }
            .title-selector-container { margin-bottom: 15px; border-bottom: 2px solid #000; padding-bottom: 10px; }
            #photo-list { border: 1px solid #475569; border-top: none; }
            #photo-list:empty { display: none; }
            .photo-item { width: 180px; height: 180px; }
            #impact_desc_box { border: 1px solid #ccc; background: #fff !important; }
        }
    </style>
</head>
<body>

<button class="btn-settings input-only" onclick="toggleModal('settingsModal', true)">⚙️</button>

<div id="settingsModal" class="modal input-only">
    <div class="modal-content">
        <h3 style="margin-top:0;">⚙️ 定型文マスター登録</h3>
        <div id="master-editor" style="max-height: 60vh; overflow-y: auto;"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn" style="background:var(--success); flex:1;" onclick="saveMaster()">保存</button>
            <button class="btn" style="background:#eee; color:#333; flex:1;" onclick="toggleModal('settingsModal', false)">閉じる</button>
        </div>
    </div>
</div>

<div id="pickerModal" class="modal input-only">
    <div class="modal-content" style="max-width:350px;">
        <h4 id="picker-title" style="margin-top:0;">選択</h4>
        <div id="picker-list" style="display:grid; gap:10px;"></div>
        <button class="btn" style="background:#666; width:100%; margin-top:20px;" onclick="toggleModal('pickerModal', false)">キャンセル</button>
    </div>
</div>

<div class="app-container">
    <div class="card">
        <div class="title-selector-container">
            <img class="app-icon-img" src="https://img.icons8.com/color/96/handshake-heart.png" alt="ONMUSUBI Logo">
            <select id="main_title_select" class="title-select" onchange="updateTitleUI(); autoSave();">
                <option value="事 故 報 告 書">事 故 報 告 書</option>
                <option value="ヒヤリハット報告">ヒヤリハット報告</option>
            </select>
        </div>

        <div class="input-grid">
            <div class="field"><label>利用者名</label><input type="text" id="user_name" oninput="autoSave()"></div>
            <div class="field"><label>区分</label><select id="category" onchange="autoSave();"></select></div>
            <div class="field"><label>報告者</label><input type="text" id="reporter" oninput="autoSave()"></div>
            <div class="field"><label>発生場所</label><input type="text" id="location" oninput="autoSave()"></div>
        </div>

        <div class="input-grid" style="grid-template-columns: 1.5fr 1fr 1fr;">
            <div class="field">
                <label>発生日時</label>
                <input type="datetime-local" id="event_date" onchange="autoSave()" style="width: 100%;">
            </div>
            <div class="field">
                <label>影響レベル</label>
                <select id="impact_level" onchange="updateImpactUI(); autoSave();">
                    <option value="">未選択</option>
                    <option value="0">レベル 0</option><option value="1">レベル 1</option><option value="2">レベル 2</option>
                    <option value="3a">レベル 3a</option><option value="3b">レベル 3b</option><option value="4">レベル 4</option><option value="5">レベル 5</option>
                </select>
            </div>
            <div class="field" style="justify-content: flex-end;"><div id="impact_type_badge"></div></div>
        </div>

        <div id="impact_desc_box">
            <div id="impact_text">レベルを選択すると基準が表示されます</div>
        </div>

        <div class="section-title">バイタル・ケガの状態</div>
        <div class="vital-grid">
            <div class="field"><label>体温</label><input type="number" step="0.1" id="v_temp" oninput="autoSave()"></div>
            <div class="field"><label>血圧</label><input type="text" id="v_bp" oninput="autoSave()"></div>
            <div class="field"><label>脈拍</label><input type="number" id="v_hr" oninput="autoSave()"></div>
            <div class="field"><label>呼吸数</label><input type="number" id="v_rr" oninput="autoSave()"></div>
            <div class="field"><label>SpO2</label><input type="number" id="v_spo2" oninput="autoSave()"></div>
        </div>
        <div class="content-box" style="border-top:none;"><input type="text" id="injury" style="border:none;" placeholder="ケガの状態を入力" oninput="autoSave()"></div>

        <div class="section-title">
            <span>現場・ケガの写真</span>
            <label class="btn-pick input-only" style="background:var(--accent); color:white;">追加 <input type="file" id="photo-input" accept="image/*" multiple style="display:none;" onchange="handlePhotos(event)"></label>
        </div>
        <div id="photo-list" class="content-box"></div>

        <div class="section-title">
            <span>事故発生状況</span>
            <button class="btn-pick input-only" onclick="openPicker('situation')">📋 定型文</button>
        </div>
        <div class="content-box">
            <textarea id="situation" placeholder="状況を入力" oninput="autoResize(this); autoSave();"></textarea>
        </div>

        <div class="section-title">原因分析（5M）</div>
        <div class="analysis-grid input-only">
            <div class="m-box"><label>利用者</label><select multiple class="m-sel" id="m_user" onchange="sync5M()"></select><button class="btn-close-sel" onclick="closeSel('m_user')">確定</button></div>
            <div class="m-box"><label>職員</label><select multiple class="m-sel" id="m_staff" onchange="sync5M()"></select><button class="btn-close-sel" onclick="closeSel('m_staff')">確定</button></div>
            <div class="m-box"><label>環境</label><select multiple class="m-sel" id="m_mac" onchange="sync5M()"></select><button class="btn-close-sel" onclick="closeSel('m_mac')">確定</button></div>
            <div class="m-box"><label>手順</label><select multiple class="m-sel" id="m_met" onchange="sync5M()"></select><button class="btn-close-sel" onclick="closeSel('m_met')">確定</button></div>
            <div class="m-box"><label>管理</label><select multiple class="m-sel" id="m_mng" onchange="sync5M()"></select><button class="btn-close-sel" onclick="closeSel('m_mng')">確定</button></div>
        </div>
        <div class="content-box"><textarea id="analysis_text" oninput="autoResize(this); autoSave();" placeholder="分析結果"></textarea></div>

        <div class="section-title">
            <span>再発予防策</span>
            <button class="btn-pick input-only" onclick="openPicker('prevent')">📋 定型文</button>
        </div>
        <div class="content-box"><textarea id="prevent" oninput="autoResize(this); autoSave();" placeholder="予防策を入力"></textarea></div>

        <div class="record-gen-section input-only" style="margin-top:15px; border:1px solid var(--orange); padding:10px; background:#fffaf5; border-radius:8px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px; align-items:center;">
                <span style="font-weight:bold; color:var(--orange); font-size:0.9rem;">📝 記録転送用 (5W1H形式)</span>
                <button class="btn-pick" style="background:#34495e; color:white;" onclick="copyRecord()">コピー</button>
            </div>
            <textarea id="generated_record" readonly style="min-height:100px; font-size:12px;"></textarea>
            <button class="btn" style="background:var(--orange); width:100%; margin-top:5px; font-size:0.9rem;" onclick="generateRecord()">✨ 自動生成</button>
        </div>

        <div class="action-bar input-only">
            <button class="btn" style="background:var(--accent);" onclick="downloadJSON()">📁 保存</button>
            <button class="btn" style="background:var(--success);" onclick="window.print()">🖨️ A4印刷</button>
        </div>
    </div>
    
    <footer class="input-only">©️ONMUSUBI 2026</footer>
</div>

<script>
// (スクリプト部分は元のロジックを維持)
const impactData = {
    "0": { type: "ヒヤリハット", degree: "実害なし", desc: "誤った行為が発生したが、患者に実施される前に発見されたか、実施されたが影響がなかった。" },
    "1": { type: "インシデント", degree: "実害なし", desc: "影響の可能性はあるが実害なし。" },
    "2": { type: "インシデント", degree: "軽度", desc: "処置・治療なし。観察強化。" },
    "3a": { type: "インシデント", degree: "中程度", desc: "簡単な処置や治療を要した。" },
    "3b": { type: "アクシデント", degree: "高度", desc: "濃厚な処置や治療を要した。" },
    "4": { type: "アクシデント", degree: "高度", desc: "永続的な障害や後遺症。" },
    "5": { type: "アクシデント", degree: "高度", desc: "死亡。" }
};

const labelMap = { category: "区分", situation: "状況", prevent: "予防策", m_user: "利用者", m_staff: "職員", m_mac: "環境", m_met: "手順", m_mng: "管理" };

let masterData = { 
    category: ["転倒", "転落", "薬関連", "嚥下・誤飲", "皮膚損傷", "暴言・暴力", "紛失", "その他"],
    situation: ["歩行中にバランスを崩し転倒。","食事中にむセ込み。","配薬の取り違え。"], 
    prevent: ["見守りの強化。","環境整備。","周知徹底。"], 
    m_user: [
        "疾患（病気）", "体調の変化", "ADL（日常生活動作）", "身体機能面の問題", "転倒しやすい", "誤嚥しやすい（嚥下機能）", "排便・排尿（尿意・便意など）", "薬の服用状態", "栄養状態", "その他(身体面)",
        "精神（心の）状況", "認知機能面", "対人関係や悩み", "なにかエピソードがあったか？", "ご利用者の生活リズム（昼夜逆転）", "望むこと、嫌なこと", "その他(生活・精神面)"
    ], 
    m_staff: [
        "視力、聴力", "体調の変化", "睡眠不足", "疲労感", "その他(身体面)",
        "精神(心の)状況", "対人関係や悩み・ストレス", "急いでいた", "焦っていた", "集中できなかった", "その他(精神面)",
        "他の利用者対応中だった", "技術不足(介護技術など)", "知識不足", "確認不足", "連絡不足", "慣れ"
    ], 
    m_mac: ["危険物の有無", "モノの置き場所、置き方", "機器の配置・機能・適合性", "センサーの不備", "適切な物を使用しているか", "道具の使用方法の不備", "その他【】", "床濡れ", "照明不足", "整理整頓"], 
    m_met: ["手順ミス", "マニュアル不備"], 
    m_mng: ["人員配置", "連携不足"] 
};
let photoList = [];

function updateTitleUI() {
    const titleVal = document.getElementById('main_title_select').value;
    if (titleVal === "ヒヤリハット報告") {
        document.getElementById('impact_level').value = "0";
        updateImpactUI();
    }
}

function updateImpactUI() {
    const val = document.getElementById('impact_level').value;
    const badge = document.getElementById('impact_type_badge');
    const text = document.getElementById('impact_text');
    if (val && impactData[val]) {
        const d = impactData[val];
        let color = "var(--success)";
        if (d.type === "アクシデント") color = "var(--danger)";
        if (d.type === "ヒヤリハット") color = "var(--info)";
        
        badge.innerHTML = `<span class="impact-badge" style="background:${color}">${d.type}</span>`;
        text.innerText = d.desc;
    } else {
        badge.innerHTML = "";
        text.innerText = "レベルを選択すると基準が表示されます";
    }
}

function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'block' : 'none'; if(show && id === 'settingsModal') renderMasterEditor(); }

function handlePhotos(event) {
    const files = event.target.files;
    for (let file of files) {
        const reader = new FileReader();
        reader.onload = (e) => { photoList.push(e.target.result); renderPhotos(); autoSave(); };
        reader.readAsDataURL(file);
    }
}
function renderPhotos() {
    const container = document.getElementById('photo-list');
    container.innerHTML = "";
    photoList.forEach((src, idx) => {
        const div = document.createElement('div'); div.className = 'photo-item';
        div.innerHTML = `<img src="${src}"><button class="btn-del-img input-only" onclick="removePhoto(${idx}, event)">×</button>`;
        container.appendChild(div);
    });
}
function removePhoto(idx, e) { e.stopPropagation(); photoList.splice(idx, 1); renderPhotos(); autoSave(); }

function renderMasterEditor() {
    const container = document.getElementById('master-editor');
    container.innerHTML = "";
    Object.keys(masterData).forEach(key => {
        const div = document.createElement('div'); div.style.marginBottom = "10px";
        div.innerHTML = `<h4 style="margin:5px 0; font-size:12px;">${labelMap[key]}</h4>`;
        masterData[key].forEach((val, idx) => {
            div.innerHTML += `<div style="display:flex; margin-bottom:2px;"><input type="text" value="${val}" onchange="masterData['${key}'][${idx}]=this.value" style="font-size:12px;"><button onclick="masterData['${key}'].splice(${idx},1);renderMasterEditor()">×</button></div>`;
        });
        div.innerHTML += `<button onclick="masterData['${key}'].push('');renderMasterEditor()" style="font-size:11px;">+ 追加</button>`;
        container.appendChild(div);
    });
}
function saveMaster() { localStorage.setItem('master_v18', JSON.stringify(masterData)); updateSelectors(); updateCategorySelector(); toggleModal('settingsModal', false); }

function updateCategorySelector() {
    const sel = document.getElementById('category');
    if(!sel) return;
    const currentVal = sel.value;
    sel.innerHTML = "";
    masterData.category.forEach(v => { if(!v) return; const o = document.createElement('option'); o.value = v; o.text = v; if(v === currentVal) o.selected = true; sel.appendChild(o); });
}

function updateSelectors() {
    ['m_user', 'm_staff', 'm_mac', 'm_met', 'm_mng'].forEach(id => {
        const sel = document.getElementById(id); if(!sel) return;
        const saved = Array.from(sel.selectedOptions).map(o => o.value);
        sel.innerHTML = "";
        (masterData[id] || []).forEach(v => { if(!v) return; const o = document.createElement('option'); o.value = v; o.text = v; if(saved.includes(v)) o.selected = true; sel.appendChild(o); });
    });
}

function openPicker(targetId) {
    const list = document.getElementById('picker-list');
    document.getElementById('picker-title').innerText = `${labelMap[targetId]}を選択`;
    list.innerHTML = "";
    masterData[targetId].forEach(text => {
        if(!text) return;
        const b = document.createElement('button'); b.className = "btn"; b.style = "background:#f0f4f8; color:#333; font-size:13px; text-align:left; font-weight:normal; border:1px solid #ddd;";
        b.innerText = text;
        b.onclick = () => { const el = document.getElementById(targetId); el.value += (el.value ? "\n" : "") + text; autoResize(el); toggleModal('pickerModal', false); autoSave(); };
        list.appendChild(b);
    });
    toggleModal('pickerModal', true);
}

function sync5M() {
    let res = "";
    const nameLabels = { m_user: "利用者", m_staff: "職員", m_mac: "環境", m_met: "手順", m_mng: "管理" };
    Object.keys(nameLabels).forEach(key => { const vals = Array.from(document.getElementById(key).selectedOptions).map(o => o.value); if(vals.length > 0) res += `【${nameLabels[key]}】${vals.join('、')}\n`; });
    const el = document.getElementById('analysis_text'); el.value = res; autoResize(el); autoSave();
}

function generateRecord() {
    const dateInput = document.getElementById('event_date').value;
    const when = dateInput ? new Date(dateInput).toLocaleString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'}) : "不明";
    const where = document.getElementById('location').value || "不明";
    const who = document.getElementById('user_name').value || "利用者";
    const reporter = document.getElementById('reporter').value || "担当者";
    const category = document.getElementById('category').value || "事象";
    const what = document.getElementById('situation').value || "-";
    const why = document.getElementById('analysis_text').value || "-";
    const how = document.getElementById('prevent').value || "-";

    const text = `【${category}報告：5W1Hまとめ】
・When（いつ）: ${when}
・Where（どこで）: ${where}
・Who（だれが）: ${who} 様（報告者: ${reporter}）
・What（何が起きたか）: ${what.replace(/\n/g, ' ')}
・Why（なぜ起きたか）: 
${why}
・How（どう対応し、防ぐか）: 
${how}`;

    const targetEl = document.getElementById('generated_record');
    targetEl.value = text;
    autoResize(targetEl);
}

function autoResize(el) { 
    if(!el) return;
    el.style.height = 'auto'; 
    el.style.height = el.scrollHeight + 'px'; 
}

function closeSel(id) { document.getElementById(id).blur(); sync5M(); }
function copyRecord() { navigator.clipboard.writeText(document.getElementById('generated_record').value).then(() => alert("コピーしました")); }

function autoSave() {
    const d = {}; document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) d[el.id] = el.value; });
    d.photos = photoList; localStorage.setItem('save_v18', JSON.stringify(d));
}
function loadData() {
    const m = localStorage.getItem('master_v18'); if(m) masterData = JSON.parse(m); 
    updateSelectors(); updateCategorySelector();
    const s = localStorage.getItem('save_v18');
    if(s) {
        const d = JSON.parse(s);
        Object.keys(d).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = d[id]; });
        if(d.photos) { photoList = d.photos; renderPhotos(); }
    }
    updateImpactUI();
    setTimeout(() => { document.querySelectorAll('textarea').forEach(autoResize); }, 200);
}
function downloadJSON() { 
    const blob = new Blob([localStorage.getItem('save_v18')], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `report_${Date.now()}.json`; a.click();
}
window.onload = loadData;
window.onbeforeprint = () => { document.querySelectorAll('textarea').forEach(autoResize); };
</script>
</body>
