<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報告アプリ_Tacchibanana_v11</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f9; --card: #ffffff; --border: #cbd5e1; --success: #27ae60; --orange: #e67e22; --dark: #1e293b; --danger: #e74c3c; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; line-height: 1.5; }
        .app-container { max-width: 850px; margin: auto; position: relative; padding-bottom: 60px; }
        
        .title-selector-container { text-align: center; margin-bottom: 20px; border-bottom: 3px double var(--primary); padding-bottom: 10px; }
        .title-select { font-size: 1.6rem; font-weight: bold; color: var(--primary); border: none; background: transparent; text-align: center; cursor: pointer; letter-spacing: 0.3em; width: 100%; outline: none; appearance: none; -webkit-appearance: none; }
        
        .btn-settings { position: fixed; top: 10px; right: 10px; z-index: 100; background: var(--dark); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 10px; position: relative; }
        
        #photo-list { display: flex; flex-wrap: wrap; gap: 10px; padding: 15px; background: #fff; border: 1px solid #cbd5e1; border-top: none; }
        .photo-item { position: relative; width: 80px; height: 80px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del-img { position: absolute; top: 0; right: 0; background: rgba(231, 76, 60, 0.9); color: white; border: none; font-size: 14px; padding: 4px 8px; cursor: pointer; }
        #full-photo-view { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; cursor:zoom-out; align-items:center; justify-content:center; }
        #full-photo-view img { max-width: 95%; max-height: 95%; }

        .card { background: var(--card); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); padding: 25px; border: 1px solid var(--border); margin-top: 10px; }
        .section-title { background: #475569; color: white; padding: 8px 12px; font-weight: bold; margin-top: 20px; font-size: 0.95rem; border-radius: 4px 4px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .content-box { border: 1px solid #475569; border-radius: 0 0 4px 4px; overflow: hidden; background: #fff; margin-bottom: 10px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.85rem; color: var(--primary); margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        textarea { border: none; min-height: 100px; }
        textarea::placeholder { color: #94a3b8; font-size: 14px; }
        
        /* 修正箇所：呼吸数を追加するため5列に調整 */
        .vital-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 12px; background: #f8fafc; border-bottom: 1px solid #eee; }
        
        #impact_desc_box { background: #fffde7; padding: 10px; border: 1px solid #fbc02d; border-radius: 6px; margin-top: 10px; font-size: 14px; min-height: 40px; }
        .impact-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: bold; color: white; font-size: 13px; margin-bottom: 5px; }

        .btn-pick { background: #e2e8f0; border: none; border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: #1e293b; font-weight: bold; }
        .analysis-grid { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: #fff; border: 1px solid #cbd5e1; border-top: none; }
        .m-box { flex: 1; min-width: 130px; }
        .m-sel { height: 110px !important; font-size: 13px; }
        .btn-close-sel { width: 100%; padding: 8px; background: #64748b; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; margin-top: 4px; font-weight: bold; }
        
        .btn { padding: 16px 24px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }

        footer { text-align: center; padding: 30px 0; color: #64748b; font-size: 14px; font-weight: 500; }

        @media print { .input-only, .btn-settings, .modal, .btn-pick, .btn-close-sel, .record-gen-section, .btn-del-img { display: none !important; } .card { box-shadow: none; border: 1px solid #000; } }
    </style>
</head>
<body>

<button class="btn-settings input-only" onclick="toggleModal('settingsModal', true)" aria-label="設定">⚙️</button>
<div id="full-photo-view" onclick="this.style.display='none'"><img id="full-img" src=""></div>

<div id="settingsModal" class="modal input-only">
    <div class="modal-content">
        <h3 style="margin-top:0;">⚙️ 定型文マスター登録</h3>
        <div id="master-editor" style="max-height: 60vh; overflow-y: auto; padding-right:5px;"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn" style="background:var(--success); flex:1; font-size:0.9rem;" onclick="saveMaster()">設定を保存</button>
            <button class="btn" style="background:#eee; color:#333; flex:1; font-size:0.9rem;" onclick="toggleModal('settingsModal', false)">閉じる</button>
        </div>
    </div>
</div>

<div id="pickerModal" class="modal input-only">
    <div class="modal-content" style="max-width:350px;">
        <h4 id="picker-title" style="margin-top:0;">選択</h4>
        <div id="picker-list" style="display:grid; gap:10px;"></div>
        <button class="btn" style="background:#666; width:100%; margin-top:20px; font-size:0.9rem;" onclick="toggleModal('pickerModal', false)">キャンセル</button>
    </div>
</div>

<div class="app-container">
    <div class="card">
        <div class="title-selector-container">
            <select id="main_title_select" class="title-select" onchange="updateTitleUI(); autoSave();">
                <option value="事 故 報 告 書">事 故 報 告 書</option>
                <option value="ヒヤリハット報告">ヒヤリハット報告</option>
            </select>
        </div>

        <div class="input-grid">
            <div class="field"><label>利用者名</label><input type="text" id="user_name" oninput="autoSave()"></div>
            <div class="field">
                <label>区分</label>
                <select id="category" onchange="autoSave();"></select>
            </div>
            <div class="field"><label>報告者</label><input type="text" id="reporter" oninput="autoSave()"></div>
            <div class="field"><label>発生場所</label><input type="text" id="location" oninput="autoSave()"></div>
        </div>

        <div class="input-grid">
            <div class="field"><label>発生日時</label><input type="datetime-local" id="event_date" onchange="autoSave()"></div>
            <div class="field">
                <label>影響レベル（画像基準）</label>
                <select id="impact_level" onchange="updateImpactUI(); autoSave();">
                    <option value="">未選択</option>
                    <option value="0">レベル 0</option>
                    <option value="1">レベル 1</option>
                    <option value="2">レベル 2</option>
                    <option value="3a">レベル 3a</option>
                    <option value="3b">レベル 3b</option>
                    <option value="4">レベル 4</option>
                    <option value="5">レベル 5</option>
                </select>
            </div>
        </div>

        <div id="impact_desc_box" class="input-only">
            <div id="impact_type_badge"></div>
            <div id="impact_text" style="color:#1e293b;">レベルを選択すると基準が表示されます</div>
        </div>

        <div class="section-title">バイタル・ケガの状態</div>
        <div class="vital-grid">
            <div class="field"><label>体温</label><input type="number" step="0.1" id="v_temp" oninput="autoSave()"></div>
            <div class="field"><label>血圧</label><input type="text" id="v_bp" oninput="autoSave()"></div>
            <div class="field"><label>脈拍</label><input type="number" id="v_hr" oninput="autoSave()"></div>
            <div class="field"><label>呼吸数</label><input type="number" id="v_rr" oninput="autoSave()"></div>
            <div class="field"><label>SpO2</label><input type="number" id="v_spo2" oninput="autoSave()"></div>
        </div>
        <div class="content-box" style="border-top:none; margin-bottom:0;"><input type="text" id="injury" style="border:none;" placeholder="ケガの状態を入力" oninput="autoSave()"></div>

        <div class="section-title">
            <span>現場・ケガの写真</span>
            <label class="btn-pick input-only" style="background:var(--accent); color:white; padding:6px 12px;">追加 <input type="file" id="photo-input" accept="image/*" multiple style="display:none;" onchange="handlePhotos(event)"></label>
        </div>
        <div id="photo-list" class="content-box"></div>

        <div class="section-title">
            <span>事故発生状況</span>
            <button class="btn-pick input-only" onclick="openPicker('situation')">📋 定型文</button>
        </div>
        <div class="content-box">
            <textarea id="situation" placeholder="何をしていたか、どのような危険があったか？" oninput="autoResize(this); autoSave();"></textarea>
        </div>

        <div class="section-title">原因分析</div>
        <div class="analysis-grid input-only">
            <div class="m-box"><label>利用者</label><select multiple class="m-sel" id="m_user" onchange="sync5M()"></select><button class="btn-close-sel" onclick="closeSel('m_user')">確定</button></div>
            <div class="m-box"><label>職員</label><select multiple class="m-sel" id="m_staff" onchange="sync5M()"></select><button class="btn-close-sel" onclick="closeSel('m_staff')">確定</button></div>
            <div class="m-box"><label>環境</label><select multiple class="m-sel" id="m_mac" onchange="sync5M()"></select><button class="btn-close-sel" onclick="closeSel('m_mac')">確定</button></div>
            <div class="m-box"><label>手順</label><select multiple class="m-sel" id="m_met" onchange="sync5M()"></select><button class="btn-close-sel" onclick="closeSel('m_met')">確定</button></div>
            <div class="m-box"><label>管理</label><select multiple class="m-sel" id="m_mng" onchange="sync5M()"></select><button class="btn-close-sel" onclick="closeSel('m_mng')">確定</button></div>
        </div>
        <div class="content-box"><textarea id="analysis_text" oninput="autoResize(this); autoSave();"></textarea></div>

        <div class="section-title">
            <span>再発予防策</span>
            <button class="btn-pick input-only" onclick="openPicker('prevent')">📋 定型文</button>
        </div>
        <div class="content-box"><textarea id="prevent" oninput="autoResize(this); autoSave();"></textarea></div>

        <div class="record-gen-section input-only" style="margin-top:30px; border:2px solid var(--orange); padding:20px; background:#fffaf5; border-radius:12px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px; align-items:center;">
                <span style="font-weight:bold; color:var(--orange); font-size:1.1rem;">📝 記録転送用テキスト</span>
                <button class="btn-pick" style="background:#34495e; color:white; padding:8px 15px;" onclick="copyRecord()">コピー</button>
            </div>
            <div class="content-box"><textarea id="generated_record" readonly style="min-height:100px; background:#fefefe;"></textarea></div>
            <button class="btn" style="background:var(--orange); width:100%; margin-top:15px;" onclick="generateRecord()">✨ 記録文を自動生成</button>
        </div>

        <div class="action-bar input-only">
            <button class="btn" style="background:var(--accent);" onclick="downloadJSON()">📁 保存</button>
            <button class="btn" style="background:var(--success);" onclick="window.print()">🖨️ 印刷 / PDF</button>
        </div>
    </div>
    
    <footer>
        ©️ONMUSUBI 2026
    </footer>
</div>

<script>
const impactData = {
    "0": { type: "インシデント", degree: "実害なし", desc: "エラーや医薬品・医療器具の不具合が見られたが、患者には実施されなかった。" },
    "1": { type: "インシデント", degree: "実害なし", desc: "何らかの影響を及ぼした可能性はあるが、実害はなかった。" },
    "2": { type: "インシデント", degree: "軽度", desc: "処置や治療は行わなかった（バイタルサインの軽度変化、観察の強化、安全確認の検査など）。" },
    "3a": { type: "インシデント", degree: "中程度", desc: "簡単な処置や治療を要した（消毒、湿布、皮膚の縫合、鎮痛剤の投与など）。" },
    "3b": { type: "アクシデント", degree: "高度", desc: "濃厚な処置や治療を要した（バイタルサインの高度変化、人工呼吸器、手術、入院日数の延長、骨折など）。" },
    "4": { type: "アクシデント", degree: "高度", desc: "永続的な障害や後遺症が残存（有意な機能障害や美容上の問題）。" },
    "5": { type: "アクシデント", degree: "高度", desc: "死亡（現疾患の自然経過によるものを除く）。" }
};

const labelMap = { category: "区分", situation: "状況", prevent: "予防策", m_user: "利用者", m_staff: "職員", m_mac: "環境", m_met: "手順", m_mng: "管理" };

let masterData = { 
    category: ["転倒", "転落", "薬", "嚥下", "皮膚", "その他"],
    situation: ["歩行中に転倒。","配薬ミス。"], 
    prevent: ["見守り強化。"], 
    m_user: ["疾患（病気）","体調の変化","ADL（日常生活動作）","身体機能面の問題","転倒しやすい","誤嚥しやすい（嚥下機能）","排便・排尿（尿意・便意など）","薬の服用状態","栄養状態","精神（心の）状況","認知機能面","対人関係や悩み","なにかエピソードがあったか？","ご利用者の生活リズム（昼夜逆転）","望むこと、嫌なこと"], 
    m_staff: ["視力、聴力","体調の変化","睡眠不足","疲労感","精神（心の）状況","対人関係や悩み・ストレス","急いでいた","焦っていた","集中できなかった","他の利用者対応中だった","技術不足(介護技術など)","知識不足","確認不足","連絡不足","慣れ"], 
    m_mac: ["床濡れ・滑りやすさ","危険物の有無","モノの置き場所、置き方","機器の配置・機能・適合性","センサーの不備","適切な物を使用しているか","道具の使用方法の不備","その他【】"], 
    m_met: ["手順ミス"], 
    m_mng: ["人員配置"] 
};
let photoList = [];

function updateTitleUI() {
    const titleVal = document.getElementById('main_title_select').value;
    const impactSelector = document.getElementById('impact_level');
    if (titleVal === "ヒヤリハット報告") {
        impactSelector.value = "0";
        updateImpactUI();
    }
}

function updateImpactUI() {
    const val = document.getElementById('impact_level').value;
    const badge = document.getElementById('impact_type_badge');
    const text = document.getElementById('impact_text');
    if (val && impactData[val]) {
        const d = impactData[val];
        const color = d.type === "アクシデント" ? "var(--danger)" : "var(--success)";
        badge.innerHTML = `<span class="impact-badge" style="background:${color}">${d.type}（${d.degree}）</span>`;
        text.innerText = d.desc;
    } else {
        badge.innerHTML = "";
        text.innerText = "レベルを選択すると基準が表示されます";
    }
}

function toggleModal(id, show) {
    document.getElementById(id).style.display = show ? 'block' : 'none';
    if(show && id === 'settingsModal') renderMasterEditor();
}

function handlePhotos(event) {
    const files = event.target.files;
    for (let file of files) {
        const reader = new FileReader();
        reader.onload = (e) => { photoList.push(e.target.result); renderPhotos(); autoSave(); };
        reader.readAsDataURL(file);
    }
}
function renderPhotos() {
    const container = document.getElementById('photo-list');
    container.innerHTML = "";
    photoList.forEach((src, idx) => {
        const div = document.createElement('div'); div.className = 'photo-item';
        div.innerHTML = `<img src="${src}" onclick="viewPhoto('${src}')"><button class="btn-del-img" onclick="removePhoto(${idx}, event)">×</button>`;
        container.appendChild(div);
    });
}
function viewPhoto(src) { document.getElementById('full-img').src = src; document.getElementById('full-photo-view').style.display = 'flex'; }
function removePhoto(idx, e) { e.stopPropagation(); photoList.splice(idx, 1); renderPhotos(); autoSave(); }

function renderMasterEditor() {
    const container = document.getElementById('master-editor');
    container.innerHTML = "";
    Object.keys(masterData).forEach(key => {
        const div = document.createElement('div'); div.style.marginBottom = "15px";
        div.innerHTML = `<h4 style="margin:0 0 5px 0; font-size:14px; color:var(--accent);">${labelMap[key]}</h4>`;
        masterData[key].forEach((val, idx) => {
            div.innerHTML += `<div style="display:flex; gap:2px; margin-bottom:4px;"><input type="text" value="${val}" onchange="masterData['${key}'][${idx}]=this.value" style="padding:5px; font-size:13px;"><button onclick="masterData['${key}'].splice(${idx},1);renderMasterEditor()">×</button></div>`;
        });
        div.innerHTML += `<button onclick="masterData['${key}'].push('');renderMasterEditor()" style="font-size:12px; cursor:pointer;">+ 追加</button>`;
        container.appendChild(div);
    });
}
function saveMaster() { 
    localStorage.setItem('master_v11', JSON.stringify(masterData)); 
    updateSelectors(); 
    updateCategorySelector();
    toggleModal('settingsModal', false); 
}

function updateCategorySelector() {
    const sel = document.getElementById('category');
    const currentVal = sel.value;
    sel.innerHTML = "";
    masterData.category.forEach(v => {
        if(!v) return;
        const o = document.createElement('option');
        o.value = v; o.text = v;
        if(v === currentVal) o.selected = true;
        sel.appendChild(o);
    });
}

function updateSelectors() {
    ['m_user', 'm_staff', 'm_mac', 'm_met', 'm_mng'].forEach(id => {
        const sel = document.getElementById(id); const saved = Array.from(sel.selectedOptions).map(o => o.value);
        sel.innerHTML = "";
        (masterData[id] || []).forEach(v => { if(!v) return; const o = document.createElement('option'); o.value = v; o.text = v; if(saved.includes(v)) o.selected = true; sel.appendChild(o); });
    });
}
function openPicker(targetId) {
    const list = document.getElementById('picker-list');
    document.getElementById('picker-title').innerText = `${labelMap[targetId]}を選択`;
    list.innerHTML = "";
    masterData[targetId].forEach(text => {
        if(!text) return;
        const b = document.createElement('button'); b.className = "btn"; b.style = "background:#f0f4f8; color:#333; font-size:14px; text-align:left; font-weight:normal; border:2px solid #ddd; padding:15px;";
        b.innerText = text;
        b.onclick = () => { const el = document.getElementById(targetId); el.value += (el.value ? "\n" : "") + text; autoResize(el); toggleModal('pickerModal', false); autoSave(); };
        list.appendChild(b);
    });
    toggleModal('pickerModal', true);
}

function sync5M() {
    let res = "";
    const nameLabels = { m_user: "利用者", m_staff: "職員", m_mac: "環境", m_met: "手順", m_mng: "管理" };
    Object.keys(nameLabels).forEach(key => { const vals = Array.from(document.getElementById(key).selectedOptions).map(o => o.value); if(vals.length > 0) res += `【${nameLabels[key]}】${vals.join('、')}\n`; });
    const el = document.getElementById('analysis_text'); el.value = res; autoResize(el); autoSave();
}

function generateRecord() {
    const name = document.getElementById('user_name').value || "利用者";
    const loc = document.getElementById('location').value || "-";
    const dateStr = document.getElementById('event_date').value ? new Date(document.getElementById('event_date').value).toLocaleString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : "-";
    const impactVal = document.getElementById('impact_level').value;
    const impactText = impactVal ? `影響レベル：${impactVal}（${impactData[impactVal].type}）` : "影響レベル：未設定";
    const sit = document.getElementById('situation').value || "-";
    const inj = document.getElementById('injury').value || "なし";
    const vt = document.getElementById('v_temp').value || "-";
    const vb = document.getElementById('v_bp').value || "-";
    const vh = document.getElementById('v_hr').value || "-";
    const vr = document.getElementById('v_rr').value || "-"; // 追加
    const vs = document.getElementById('v_spo2').value || "-";
    
    // 記録文にRを追加
    const vitalLine = `バイタル：T:${vt} BP:${vb} P:${vh} R:${vr} SpO2:${vs}%`;
    const text = `【報告記録：${name}様】\n発生日時：${dateStr}\n場所：${loc}\n${impactText}\n${vitalLine}\nケガの状態：${inj}\n\n＜状況詳細＞\n${sit}`;
    document.getElementById('generated_record').value = text;
    autoResize(document.getElementById('generated_record'));
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
function closeSel(id) { document.getElementById(id).blur(); sync5M(); }
function copyRecord() { navigator.clipboard.writeText(document.getElementById('generated_record').value).then(() => alert("コピーしました")); }

function autoSave() {
    const d = {}; document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) d[el.id] = el.value; });
    d.photos = photoList; localStorage.setItem('save_v11', JSON.stringify(d));
}
function loadData() {
    const m = localStorage.getItem('master_v11'); if(m) masterData = JSON.parse(m); 
    updateSelectors();
    updateCategorySelector();
    const s = localStorage.getItem('save_v11');
    if(s) {
        const d = JSON.parse(s);
        Object.keys(d).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = d[id]; });
        if(d.photos) { photoList = d.photos; renderPhotos(); }
    }
    updateImpactUI(); document.querySelectorAll('textarea').forEach(autoResize);
}
function downloadJSON() { 
    const blob = new Blob([localStorage.getItem('save_v11')], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `report_${Date.now()}.json`; a.click();
}
window.onload = loadData;
